<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Minecraft Skin Converter 🧱</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      text-align: center;
      padding: 20px;
    }

    h1 {
      color: #00ffcc;
    }

    input {
      margin: 20px;
    }

    canvas {
      border: 2px solid #00ffcc;
      image-rendering: pixelated;
      margin-top: 10px;
    }

    button {
      background: #00ffcc;
      border: none;
      padding: 10px 20px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 15px;
      border-radius: 6px;
    }

    button:hover {
      background: #00ffaa;
    }
  </style>
</head>
<body>

  <h1>🧱 Minecraft Skin Converter</h1>
  <p>Upload an image → converts to 64×64 Minecraft skin</p>

  <input type="file" id="upload" accept="image/*">

  <br>
  <canvas id="canvas" width="64" height="64"></canvas>

  <br>
  <button onclick="downloadSkin()">Download Skin</button>

  <script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');

    upload.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;

      const img = new Image();
      img.onload = function() {
        // Clear canvas
        ctx.clearRect(0, 0, 64, 64);

        // Draw resized image (64x64)
        ctx.drawImage(img, 0, 0, 64, 64);
      };

      img.src = URL.createObjectURL(file);
    });

    function downloadSkin() {
      const link = document.createElement('a');
      link.download = 'minecraft_skin.png';
      link.href = canvas.toDataURL();
      link.click();
    }
  </script>

</body>
</html>
